<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket — Hearth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .detail-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
  @media (max-width: 860px) { .detail-grid { grid-template-columns: 1fr; } }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.86rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 14px; }
  .back-link:hover { color: var(--ink); text-decoration: none; }
  .meta-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .meta-row:last-child { border-bottom: none; }
  .meta-row .label { color: var(--ink-soft); }
</style>
</head>
<body class="page-shell">
  <div class="brand-stripe"></div>

  <nav class="topnav">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="3.4" fill="#D97757"/>
        <path d="M16 10.5C19 10.5 21.5 13 21.5 16" stroke="#EFBF04" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 6C21.5 6 26 10.5 26 16" stroke="#EFBF04" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
        <path d="M16 10.5C13 10.5 10.5 13 10.5 16" stroke="#7C8B5E" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 6C10.5 6 6 10.5 6 16" stroke="#7C8B5E" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
      </svg>
      Hearth
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="submit-ticket.html">Submit a ticket</a>
      <a href="staff-queue.html" id="staffQueueLink">Staff queue</a>
    </div>
    <div class="nav-user">
      <div class="nav-user-avatar" id="navUserAvatar"></div>
      <span id="navUserName"></span>
      <button class="btn btn-ghost" id="logoutBtn" style="padding: 6px 14px;">Log out</button>
    </div>
  </nav>

  <main class="container" style="padding-top: 32px; padding-bottom: 56px; flex: 1;">
    <a href="javascript:history.back()" class="back-link">&larr; Back</a>

    <div id="loadingState"><p class="muted text-sm">Loading ticket...</p></div>
    <div id="errorState" style="display:none;"><p class="text-sm" style="color: var(--terracotta-deep);" id="errorMsg"></p></div>

    <div id="ticketContent" style="display:none;">
      <div class="card" style="margin-bottom: 20px;">
        <div class="ticket-header">
          <div>
            <span class="ticket-card-id" id="ticketIdLabel"></span>
            <h2 id="ticketSubject" style="margin-top: 4px;"></h2>
            <div class="ticket-header-tags" id="ticketTags"></div>
          </div>
          <div class="status-actions" id="statusActions"></div>
        </div>
        <p id="ticketDescription" style="color: var(--ink); font-size: 0.95rem;"></p>
      </div>

      <div class="detail-grid">
        <div class="card">
          <h3>Conversation</h3>
          <div class="chat-thread" id="chatThread"></div>
          <div class="reply-box">
            <textarea id="replyMessage" placeholder="Write a reply..."></textarea>
            <button class="btn btn-primary" id="replyBtn">Send</button>
          </div>
        </div>

        <div class="card card-accent-moss">
          <h3>Details</h3>
          <div class="meta-row"><span class="label">Created</span><span id="metaCreated"></span></div>
          <div class="meta-row"><span class="label">Department</span><span id="metaDept"></span></div>
          <div class="meta-row"><span class="label">Priority</span><span id="metaPriority"></span></div>
          <div class="meta-row"><span class="label">Status</span><span id="metaStatus"></span></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Api.requireAuth();
    Ui.initNav();

    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get('id');
    const user = Api.getUser();
    const isStaff = ['Staff', 'Admin'].includes(user.role);

    if (!ticketId) {
      window.location.href = isStaff ? 'staff-queue.html' : 'dashboard.html';
    }

    function renderTicket(ticket) {
      document.getElementById('ticketIdLabel').textContent = `#${ticket.ticketId}`;
      document.getElementById('ticketSubject').textContent = ticket.subject;
      document.getElementById('ticketDescription').textContent = ticket.description;
      document.getElementById('ticketTags').innerHTML =
        Ui.statusTag(ticket.status) + Ui.priorityTag(ticket.priority) + Ui.departmentTag(ticket.department);

      document.getElementById('metaCreated').textContent = Ui.formatDate(ticket.createdAt);
      document.getElementById('metaDept').innerHTML = Ui.departmentTag(ticket.department);
      document.getElementById('metaPriority').innerHTML = Ui.priorityTag(ticket.priority);
      document.getElementById('metaStatus').innerHTML = Ui.statusTag(ticket.status);

      // only staff/admin can move a ticket through its lifecycle
      const actions = document.getElementById('statusActions');
      if (isStaff) {
        const nextSteps = {
          Open: [['In_Progress', 'Start working']],
          In_Progress: [['Resolved', 'Mark resolved']],
          Resolved: [['Closed', 'Close ticket'], ['In_Progress', 'Reopen']],
          Closed: []
        };
        actions.innerHTML = (nextSteps[ticket.status] || []).map(([status, label]) =>
          `<button class="btn btn-secondary btn-sm" data-status="${status}">${label}</button>`
        ).join('');
        actions.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => updateStatus(btn.dataset.status));
        });
      }
    }

    async function updateStatus(newStatus) {
      try {
        const updated = await Api.updateTicketStatus(ticketId, newStatus);
        renderTicket(updated);
      } catch (err) {
        alert(err.message);
      }
    }

    function renderComments(comments) {
      const thread = document.getElementById('chatThread');
      if (!comments.length) {
        thread.innerHTML = `<p class="muted text-sm">No replies yet.</p>`;
        return;
      }
      thread.innerHTML = comments.map(c => {
        const isStaffAuthor = ['Staff', 'Admin'].includes(c.authorRole);
        return `
          <div class="chat-bubble ${isStaffAuthor ? 'chat-bubble-staff' : 'chat-bubble-customer'}">
            <div class="chat-bubble-meta">${Ui.escapeHtml(c.authorName)} · ${c.authorRole} · ${Ui.formatDate(c.createdAt)}</div>
            ${Ui.escapeHtml(c.message)}
          </div>
        `;
      }).join('');
    }

    async function loadAll() {
      try {
        const [ticket, comments] = await Promise.all([
          Api.getTicket(ticketId),
          Api.getComments(ticketId)
        ]);

        renderTicket(ticket);
        renderComments(comments);

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('ticketContent').style.display = 'block';
      } catch (err) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        document.getElementById('errorMsg').textContent = err.message;
      }
    }

    document.getElementById('replyBtn').addEventListener('click', async () => {
      const textarea = document.getElementById('replyMessage');
      const message = textarea.value.trim();
      if (!message) return;

      try {
        await Api.addComment(ticketId, message);
        textarea.value = '';
        const comments = await Api.getComments(ticketId);
        renderComments(comments);
      } catch (err) {
        alert(err.message);
      }
    });

    loadAll();
  </script>
</body>
</html>
