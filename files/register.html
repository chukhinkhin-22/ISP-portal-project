<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Hearth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-card {
    max-width: 480px; width: 100%;
    background: var(--paper-raised);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lift);
    padding: 48px 44px;
    position: relative; overflow: hidden;
  }
  .auth-card-blob { position: absolute; width: 220px; height: 220px; border-radius: 50%; background: var(--gold-light); opacity: 0.22; filter: blur(40px); top: -90px; left: -70px; }
  .auth-card-header { text-align: center; margin-bottom: 30px; position: relative; z-index: 1; }
  .auth-card-header .brand-mark { margin: 0 auto 16px; display: block; width: 38px; height: 38px; }
  .auth-card form, .auth-card .form-error-banner, .auth-card p:last-of-type { position: relative; z-index: 1; }
</style>
</head>
<body class="page-shell">
  <div class="brand-stripe"></div>

  <div class="center-shell">
    <div class="auth-card">
      <div class="auth-card-blob"></div>

      <div class="auth-card-header">
        <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="3.4" fill="#D97757"/>
          <path d="M16 10.5C19 10.5 21.5 13 21.5 16" stroke="#EFBF04" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 6C21.5 6 26 10.5 26 16" stroke="#EFBF04" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
          <path d="M16 10.5C13 10.5 10.5 13 10.5 16" stroke="#7C8B5E" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 6C10.5 6 6 10.5 6 16" stroke="#7C8B5E" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
        </svg>
        <span class="eyebrow" style="justify-content:center; width:100%;">Get started</span>
        <h2>Join Hearth</h2>
        <p class="text-sm">Set up your account to manage your connection and reach support.</p>
      </div>

      <div id="errorBanner" class="form-error-banner"></div>

      <form id="registerForm">
        <div class="field">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" required autocomplete="name" placeholder="Aye Chan Moe">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label for="phone">Phone <span class="muted">(optional)</span></label>
          <input type="tel" id="phone" autocomplete="tel" placeholder="09xxxxxxxxx">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
          <p class="field-hint">Minimum 8 characters.</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
          <span id="registerBtnText">Create account</span>
        </button>
      </form>

      <p class="text-sm" style="margin-top: 22px; text-align: center;">
        Already have an account? <a href="index.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (Api.isLoggedIn()) window.location.href = 'dashboard.html';

    const form = document.getElementById('registerForm');
    const errorBanner = document.getElementById('errorBanner');
    const registerBtn = document.getElementById('registerBtn');
    const registerBtnText = document.getElementById('registerBtnText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBanner.style.display = 'none';
      registerBtn.disabled = true;
      registerBtnText.innerHTML = '<span class="spinner"></span>';

      try {
        const result = await Api.register({
          fullName: document.getElementById('fullName').value.trim(),
          email: document.getElementById('email').value.trim(),
          phone: document.getElementById('phone').value.trim() || null,
          password: document.getElementById('password').value
        });
        Api.setSession(result);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorBanner.textContent = err.message.toLowerCase().includes('already exists')
          ? 'An account with this email already exists. Try logging in instead.'
          : err.message;
        errorBanner.style.display = 'block';
        registerBtn.disabled = false;
        registerBtnText.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
